name: Feature Request
description: Suggest an idea or enhancement for eIsland
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion. Clear context helps us evaluate faster.
        感谢你的建议，清晰的描述有助于我们更快评估。

  - type: textarea
    id: pain
    attributes:
      label: Pain Point / 当前痛点
      description: What problem are you facing right now? / 你现在遇到的痛点是什么？
      placeholder: "e.g. Current settings require too many steps to switch configurations.\n例如：现有设置方式步骤较多，切换配置效率低。"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution / 期望方案
      description: What new capability or change would you like? / 你希望新增或调整什么能力？
      placeholder: "Describe your ideal interaction or feature. / 描述你理想中的交互或功能。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (optional) / 可选方案（可选）
      description: What alternatives have you considered? / 你考虑过哪些替代方案？
      placeholder: "Describe approaches you've tried and their shortcomings. / 可以填写你尝试过的方法及不足。"

  - type: textarea
    id: scenarios
    attributes:
      label: Use Cases / 使用场景
      description: In what scenarios would you use this feature frequently? / 在什么场景下会频繁使用该功能？
      placeholder: "Provide 1-2 concrete scenarios. / 请给出 1-2 个具体场景。"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context (optional) / 补充信息（可选）
      description: "Design mockups, reference links, screenshots, etc. / 如设计稿、参考链接、截图等。"
