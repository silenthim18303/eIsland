name: Bug Report
description: Report a reproducible problem in eIsland
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve eIsland. Please fill in the details below.
        感谢帮助我们改进 eIsland，请填写以下信息。

  - type: textarea
    id: summary
    attributes:
      label: Problem Description / 问题描述
      description: Briefly describe the problem you encountered. / 简要描述你遇到的问题。
      placeholder: "e.g. App crashes when clicking the settings page.\n例如：点击设置页面后应用闪退。"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: List the steps to reliably reproduce the issue. / 请按顺序填写可稳定复现问题的步骤。
      placeholder: |
        1. Open the app / 打开应用
        2. Go to xxx page / 进入 xxx 页面
        3. Click xxx / 点击 xxx
        4. Error occurs / 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
      placeholder: "What did you expect to happen? / 你期望发生什么？"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      placeholder: "What actually happened? Any error messages? / 实际发生了什么？有无报错提示？"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Software Version / 软件版本
      description: "e.g. v26.1.0 / 例如 v26.1.0"
      placeholder: v26.x.x

  - type: input
    id: os
    attributes:
      label: Operating System / 操作系统
      description: "e.g. Windows 11 25H2 / 例如 Windows 11 25H2"
      placeholder: Windows 10 / Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots (optional) / 日志 / 截图（可选）
      description: Paste logs or drag screenshots to help us debug faster. / 粘贴日志或拖拽截图，能显著提高排查效率。
      render: shell
