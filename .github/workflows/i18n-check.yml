name: i18n Completeness Check

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'i18n/**'
      - 'scripts/check-i18n-completeness.ts'
      - '.github/workflows/i18n-check.yml'
  pull_request:
    paths:
      - 'i18n/**'
      - 'src/**'
      - 'scripts/check-i18n-completeness.ts'
      - '.github/workflows/i18n-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      exit_code: ${{ steps.check.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run i18n completeness check
        id: check
        run: |
          set +e
          node --experimental-strip-types scripts/check-i18n-completeness.ts 2>&1 | tee i18n-check.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-check-log
          path: i18n-check.log
          if-no-files-found: warn

      - name: Fail workflow on missing translations
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "i18n completeness check failed. See log for details."
          exit 1

  comment-i18n-report:
    if: always() && github.event_name == 'pull_request'
    needs: i18n-check
    runs-on: ubuntu-latest

    steps:
      - name: Download check log
        uses: actions/download-artifact@v4
        with:
          name: i18n-check-log
          path: .

      - name: Comment i18n report on PR
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ needs.i18n-check.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const marker = '<!-- i18n-check-report -->';

            const readLog = (path) => {
              try {
                const content = fs.readFileSync(path, 'utf8').trim();
                if (!content) return '(empty output)';
                return content.length > 3000 ? `${content.slice(0, 3000)}\n... (truncated)` : content;
              } catch {
                return '(log file not found)';
              }
            };

            const exitCode = process.env.EXIT_CODE || '1';
            const status = exitCode === '0' ? '✅ All translations in sync' : '❌ Missing translations detected';
            const shortSha = (context.sha || '').slice(0, 7) || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${marker}
            ## 🌐 i18n Translation Completeness Report

            **Status:** ${status}
            - Commit: \`${shortSha}\`

            <details>
            <summary>Check output</summary>

            \`\`\`
            ${readLog('i18n-check.log')}
            \`\`\`
            </details>

            [View workflow run](${runUrl})`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
