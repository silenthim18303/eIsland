name: PR Code Quality Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze changed frontend files
        id: quality_check
        uses: actions/github-script@v7
        with:
          # Fall back to GITHUB_TOKEN when BOT_PAT is unavailable (e.g. fork PRs)
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const selfCheckChecklist = [
              { id: 'STD-1-HTML', label: 'Verified all clauses in docs/FRONTEND_STANDARDS.md Chapter 1 HTML Standards' },
              { id: 'STD-2-CSS', label: 'Verified all clauses in docs/FRONTEND_STANDARDS.md Chapter 2 CSS Standards' },
              { id: 'STD-3-JSTS', label: 'Verified all clauses in docs/FRONTEND_STANDARDS.md Chapter 3 JavaScript / TypeScript Standards' },
              { id: 'STD-4-REACT', label: 'Verified all clauses in docs/FRONTEND_STANDARDS.md Chapter 4 React Standards' },
              { id: 'STD-5-NEXT', label: 'Verified all clauses in docs/FRONTEND_STANDARDS.md Chapter 5 Next.js Standards (if applicable)' },
              { id: 'STD-COMMENT', label: 'Verified all clauses in docs/COMMENT_STANDARDS.md' }
            ];

            const prBody = pr.body || '';
            const uncheckedChecklist = selfCheckChecklist
              .filter((item) => {
                const checkedPattern = new RegExp(`-\\s*\\[[xX]\\]\\s*${item.id}\\b`);
                return !checkedPattern.test(prBody);
              })
              .map((item) => `${item.id} | ${item.label}`);

            const detectViolationLines = (text, testFn) => {
              const lines = text.split('\n');
              const matched = [];
              for (let i = 0; i < lines.length; i += 1) {
                try {
                  if (testFn(lines[i])) matched.push(i + 1);
                } catch {
                  // Skip to next line if single-line detection fails
                }
              }
              return matched;
            };

            const rules = [
              {
                id: 'no-var',
                desc: 'JS/TS: var is forbidden',
                applies: /\.(js|jsx|ts|tsx)$/,
                test: (text) => /(^|\s)var\s+/.test(text)
              },
              {
                id: 'no-any',
                desc: 'TypeScript: avoid any',
                applies: /\.(ts|tsx)$/,
                test: (text) => /(:\s*any\b|<\s*any\s*>|\bas\s+any\b)/.test(text)
              },
              {
                id: 'eqeqeq',
                desc: 'Must use === / !==',
                applies: /\.(js|jsx|ts|tsx)$/,
                test: (text) => /(^|[^=!])==([^=]|$)|(^|[^!])!=([^=]|$)/m.test(text)
              },
              {
                id: 'no-for-in-of',
                desc: 'Avoid for...in / for...of, prefer higher-order functions',
                applies: /\.(js|jsx|ts|tsx)$/,
                test: (text) => /for\s*\([^)]*\b(?:in|of)\b[^)]*\)/.test(text)
              },
              {
                id: 'no-eval-function-constructor',
                desc: 'Security: eval / new Function is forbidden',
                applies: /\.(js|jsx|ts|tsx)$/,
                test: (text) => /\beval\s*\(|new\s+Function\s*\(/.test(text)
              },
              {
                id: 'no-react-import-in-jsx-runtime',
                desc: 'React 17+: avoid unused default React import in JSX files',
                applies: /\.(jsx|tsx)$/,
                test: (text) => /import\s+React\s+from\s+['"]react['"]\s*;/.test(text)
              },
              {
                id: 'no-props-spread',
                desc: 'React: props spreading is forbidden',
                applies: /\.(jsx|tsx)$/,
                test: (text) => /<\w[^>]*\{\s*\.\.\.[^}]+\}[^>]*>/.test(text)
              },
              {
                id: 'no-index-key',
                desc: 'React: using index as list key is forbidden',
                applies: /\.(jsx|tsx)$/,
                test: (text) => /key\s*=\s*\{\s*index\s*\}/.test(text)
              },
              {
                id: 'jsx-brace-spacing',
                desc: 'JSX: no extra spaces inside curly braces',
                applies: /\.(jsx|tsx)$/,
                test: (text) => text.split('\n').some(line => {
                  const t = line.trim();
                  if (/^(const|let|var|return)\s/.test(t)) return false;
                  return /\b[\w:-]+\s*=\s*\{\s+[^\n}]+\s+\}/.test(t);
                })
              },
              {
                id: 'no-important',
                desc: 'CSS: !important is forbidden',
                applies: /\.(css|scss|sass)$/,
                test: (text) => /!important/.test(text)
              },
              {
                id: 'html-no-inline-handler',
                desc: 'HTML: inline event handlers are forbidden',
                applies: /\.html$/,
                test: (text) => /\son[a-z]+\s*=\s*['"][^'"]*['"]/i.test(text)
              }
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const targets = files
              .filter((f) => f.status !== 'removed')
              .map((f) => f.filename)
              .filter((name) => /^(src\/renderer\/|src\/shared\/|assets\/|index\.html|src\/)/.test(name))
              .filter((name) => /\.(js|jsx|ts|tsx|css|scss|sass|html)$/.test(name));

            const violations = [];

            for (const filename of targets) {
              let text = '';
              try {
                const resp = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: filename,
                  ref: pr.head.sha
                });

                if (!('content' in resp.data) || !resp.data.content) {
                  continue;
                }
                text = Buffer.from(resp.data.content, 'base64').toString('utf8');
              } catch (error) {
                violations.push(`${filename}:1 | fetch-error | Unable to read file content`);
                continue;
              }

              for (const rule of rules) {
                if (!rule.applies.test(filename)) continue;
                if (rule.test(text)) {
                  const lines = detectViolationLines(text, rule.test);
                  if (lines.length > 0) {
                    for (const line of lines) {
                      violations.push(`${filename}:${line} | ${rule.id} | ${rule.desc}`);
                    }
                  } else {
                    violations.push(`${filename}:1 | ${rule.id} | ${rule.desc}`);
                  }
                }
              }
            }

            const byRule = violations.reduce((acc, line) => {
              const rule = (line.split('|')[1] || '').trim() || 'unknown';
              acc[rule] = (acc[rule] || 0) + 1;
              return acc;
            }, {});

            const summary = [];
            summary.push(`Scanned files: ${targets.length}`);
            summary.push(`Violations: ${violations.length}`);
            summary.push(`By rule: ${JSON.stringify(byRule)}`);
            summary.push(`Checklist unchecked (self-check only): ${uncheckedChecklist.length}`);
            summary.push('');
            if (violations.length > 0) {
              const groupedByFile = violations.reduce((acc, line) => {
                const [left] = line.split('|');
                const file = (left.split(':')[0] || '').trim() || 'unknown';
                if (!acc[file]) acc[file] = [];
                acc[file].push(line);
                return acc;
              }, {});

              const printed = new Set();
              for (const filename of targets) {
                const lines = groupedByFile[filename];
                if (!lines || lines.length === 0) continue;
                printed.add(filename);
                summary.push(`FILE | ${filename} | ${lines.length} issue(s)`);
                summary.push(...lines);
                summary.push('');
              }

              for (const [filename, lines] of Object.entries(groupedByFile)) {
                if (printed.has(filename)) continue;
                summary.push(`FILE | ${filename} | ${lines.length} issue(s)`);
                summary.push(...lines);
                summary.push('');
              }
            } else {
              summary.push('No violations detected in checked rules.');
            }

            summary.push('');
            summary.push('Checklist self-check status (non-blocking):');
            if (uncheckedChecklist.length > 0) {
              summary.push(...uncheckedChecklist.map((line) => `UNCHECKED | ${line}`));
            } else {
              summary.push('All self-check checklist items are checked in PR body.');
            }

            fs.writeFileSync('quality-check.log', summary.join('\n'), 'utf8');

            const changedFilesBody = targets.length > 0
              ? targets.map((f) => `- ${f}`).join('\n')
              : '- No frontend-related target files were detected.';
            fs.writeFileSync('quality-checked-files.md', changedFilesBody, 'utf8');

            const passed = violations.length === 0;
            core.setOutput('passed', passed ? 'true' : 'false');
            core.setOutput('violations', `${violations.length}`);
            core.setOutput('checklist_missing', `${uncheckedChecklist.length}`);

      - name: Compose review comment
        shell: bash
        run: |
          if [ -s quality-check.log ]; then
            sed -n '1,180p' quality-check.log > quality-check-preview.log
          else
            echo "No output from code quality review." > quality-check-preview.log
          fi

          {
            echo "<!-- pr-auto-code-quality-review -->"
            echo "## PR Code Quality Review"
            echo ""
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Branch: \`${{ github.event.pull_request.head.ref }}\` -> \`${{ github.event.pull_request.base.ref }}\`"
            echo "- Trigger commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Review result: ${{ steps.quality_check.outputs.passed == 'true' && 'PASS' || 'FAIL' }}"
            echo "- Violations: \`${{ steps.quality_check.outputs.violations }}\`"
            echo "- Checklist unchecked (self-check only, non-blocking): \`${{ steps.quality_check.outputs.checklist_missing }}\`"
            echo ""
            echo "### Checked Files"
            cat quality-checked-files.md
            echo ""
            echo "### Review Output (first 180 lines)"
            echo '```text'
            cat quality-check-preview.log
            echo '```'
            echo ""
          } > pr-quality-comment.md

      - name: Create or update quality comment
        uses: actions/github-script@v7
        with:
          # Fall back to GITHUB_TOKEN when BOT_PAT is unavailable (e.g. fork PRs)
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-auto-code-quality-review -->';
            const body = fs.readFileSync('pr-quality-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail workflow on quality violations
        if: steps.quality_check.outputs.passed != 'true'
        run: |
          echo "Code quality review found violations. See PR comment for details."
          exit 1
