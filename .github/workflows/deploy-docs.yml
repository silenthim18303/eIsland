name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'web/eisland-web-docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/eisland-web-docs/package-lock.json

      - name: Install dependencies
        working-directory: web/eisland-web-docs
        run: npm ci

      - name: Build docs
        working-directory: web/eisland-web-docs
        run: npm run docs:build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/eisland-web-docs/src/.vuepress/dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: dist

      - name: Extract artifact
        run: |
          cd dist
          tar -xf artifact.tar
          rm artifact.tar

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@796cf0d5e4b535745ce49d7429f77cf39e25ef39
        with:
          switches: -avzr --delete --no-owner --no-group --no-perms --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r
          path: dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Purge ESA cache
        env:
          ESA_AK: ${{ secrets.ESA_ACCESS_KEY_ID }}
          ESA_SK: ${{ secrets.ESA_ACCESS_KEY_SECRET }}
          ESA_SITE_ID: ${{ secrets.ESA_ZONE_ID }}
        run: |
          echo "Starting ESA cache purge for eisland-dev.pyisland.com..."

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NONCE=$(openssl rand -hex 16)

          # Build sorted query string for HMAC signing
          PARAMS="Action=PurgeCaches"
          PARAMS="${PARAMS}&AccessKeyId=$ESA_AK"
          PARAMS="${PARAMS}&Format=JSON"
          PARAMS="${PARAMS}&Force=true"
          PARAMS="${PARAMS}&Hostnames.1=eisland-dev.pyisland.com"
          PARAMS="${PARAMS}&RegionId=cn-hangzhou"
          PARAMS="${PARAMS}&SignatureMethod=HMAC-SHA1"
          PARAMS="${PARAMS}&SignatureNonce=$NONCE"
          PARAMS="${PARAMS}&SignatureVersion=1.0"
          PARAMS="${PARAMS}&SiteId=$ESA_SITE_ID"
          PARAMS="${PARAMS}&Timestamp=$TIMESTAMP"
          PARAMS="${PARAMS}&Type=hostname"
          PARAMS="${PARAMS}&Version=2024-09-10"

          # Percent-encode per Alibaba Cloud specification
          ENCODED=$(python3 -c "
          import urllib.parse, sys
          s = sys.argv[1]
          parts = s.split('&')
          encoded = '&'.join(
            urllib.parse.quote(k, safe='') + '=' + urllib.parse.quote(v, safe='')
            for k, v in (p.split('=', 1) for p in parts)
          )
          print(encoded)
          " "$PARAMS")

          STRING_TO_SIGN="POST&%2F&$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$ENCODED")"
          SIGNATURE=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -sha1 -hmac "$ESA_SK&" -binary | base64)

          RESPONSE=$(curl -sS -X POST "https://esa.cn-hangzhou.aliyuncs.com" \
            -d "Action=PurgeCaches" \
            -d "Version=2024-09-10" \
            -d "Format=JSON" \
            -d "AccessKeyId=$ESA_AK" \
            -d "SignatureVersion=1.0" \
            -d "SignatureMethod=HMAC-SHA1" \
            -d "Timestamp=$TIMESTAMP" \
            -d "SignatureNonce=$NONCE" \
            -d "Signature=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$SIGNATURE")" \
            -d "RegionId=cn-hangzhou" \
            -d "SiteId=$ESA_SITE_ID" \
            -d "Type=hostname" \
            -d "Hostnames.1=eisland-dev.pyisland.com" \
            -d "Force=true")

          echo "$RESPONSE" | jq || echo "$RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"Code":"Success"'; then
            echo "ESA cache purge succeeded!"
          else
            echo "ESA cache purge failed!"
            exit 1
          fi