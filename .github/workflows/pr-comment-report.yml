name: PR Comment Report

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment-report:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze PR changes and comment standards
        id: comment_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const hasJsdocBefore = (lines, index) => {
              let i = index - 1;
              while (i >= 0 && lines[i].trim() === '') i--;
              if (i < 0) return false;
              if (!lines[i].trim().endsWith('*/')) return false;
              let j = i;
              while (j >= 0 && !lines[j].includes('/**')) j--;
              return j >= 0;
            };

            const getFileHeaderJsdoc = (content) => {
              const top = content.slice(0, 3000);
              const matches = top.match(/\/\*\*[\s\S]*?\*\//g);
              if (!matches || matches.length === 0) return null;
              for (const block of matches) {
                if (block.includes('@file') || block.includes('@description') || block.includes('@author')) {
                  return block;
                }
              }
              return null;
            };

            const getTopCopyrightBlock = (content) => {
              const top = content.slice(0, 3000);
              const match = top.match(/^\s*\/\*(?!\*)([\s\S]*?)\*\//);
              if (!match) return null;
              return match[0];
            };

            const checkOneFile = (relPath, content) => {
              const violations = [];

              const copyrightBlock = getTopCopyrightBlock(content);
              if (!copyrightBlock) {
                violations.push(`${relPath}:1 | copyright_header | 缺少文件顶部版权声明注释块（/* ... */）`);
              } else {
                if (!copyrightBlock.includes('eIsland')) {
                  violations.push(`${relPath}:1 | copyright_header | 版权声明缺少项目名称（eIsland）`);
                }
                if (!copyrightBlock.includes('https://github.com/JNTMTMTM/eIsland')) {
                  violations.push(`${relPath}:1 | copyright_header | 版权声明缺少项目仓库地址`);
                }
                if (!copyrightBlock.includes('Copyright (C)')) {
                  violations.push(`${relPath}:1 | copyright_header | 版权声明缺少 Copyright (C) 行`);
                }
                if (!copyrightBlock.includes('GNU General Public License')) {
                  violations.push(`${relPath}:1 | copyright_header | 版权声明缺少 GPL 许可证声明`);
                }
              }

              const header = getFileHeaderJsdoc(content);
              if (!header) {
                violations.push(`${relPath}:1 | file_header | 缺少文件级 JSDoc（需包含 @file / @description / @author）`);
              } else {
                if (!header.includes('@file') || !header.includes('@description') || !header.includes('@author')) {
                  violations.push(`${relPath}:1 | file_header | 文件级 JSDoc 标签不完整（需包含 @file / @description / @author）`);
                }
                const authorLine = header
                  .split(/\r?\n/)
                  .map((l) => l.trim())
                  .find((l) => l.includes('@author'));
                if (!authorLine || !authorLine.includes('鸡哥')) {
                  violations.push(`${relPath}:1 | author | @author 必须统一为 鸡哥`);
                }
              }

              const lines = content.split(/\r?\n/);
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const isExportFunction = /^\s*export\s+function\s+\w+/.test(line);
                const isExportArrow = /^\s*export\s+const\s+\w+\s*=\s*(async\s*)?\([^)]*\)\s*=>/.test(line);
                const isExportDefaultFunction = /^\s*export\s+default\s+function\s+\w*/.test(line);
                if (isExportFunction || isExportArrow || isExportDefaultFunction) {
                  if (!hasJsdocBefore(lines, i)) {
                    violations.push(`${relPath}:${i + 1} | export_function_jsdoc | 导出函数缺少 JSDoc 注释`);
                  }
                }
              }

              return violations;
            };

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const commitLines = commits.map((c) => {
              const d = (c.commit?.author?.date || '').slice(0, 10);
              const shortSha = (c.sha || '').slice(0, 7);
              const subject = (c.commit?.message || '').split('\n')[0] || '(no subject)';
              return `- ${d} - [${shortSha}] ${subject}`;
            });

            fs.writeFileSync(
              'pr-change-notes.md',
              commitLines.length > 0 ? commitLines.join('\n') : '- No commits found in this PR range.',
              'utf8'
            );

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const changedFileLines = files.map((f) => `${f.status}\t${f.filename}`);
            fs.writeFileSync(
              'pr-changed-files.md',
              changedFileLines.length > 0 ? changedFileLines.join('\n') : '- No changed files detected.',
              'utf8'
            );

            const violations = [];
            for (const f of files) {
              const filename = f.filename || '';
              if (!filename.match(/\.(ts|tsx)$/) || filename.endsWith('.d.ts')) continue;
              if (f.status === 'removed') continue;

              try {
                const resp = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: filename,
                  ref: pr.head.sha
                });

                if (!('content' in resp.data) || !resp.data.content) continue;
                const text = Buffer.from(resp.data.content, 'base64').toString('utf8');
                violations.push(...checkOneFile(filename, text));
              } catch (error) {
                violations.push(`${filename}:1 | fetch_error | 无法读取该文件内容进行检查`);
              }
            }

            const byRule = violations.reduce((acc, line) => {
              const rule = (line.split('|')[1] || '').trim() || 'unknown';
              acc[rule] = (acc[rule] || 0) + 1;
              return acc;
            }, {});

            const checkLog = [];
            checkLog.push(`Comment standard violations: ${violations.length}`);
            checkLog.push(`By rule: ${JSON.stringify(byRule)}`);
            checkLog.push('');
            if (violations.length > 0) {
              checkLog.push(...violations);
            } else {
              checkLog.push('Comment standard check passed for changed TS/TSX files.');
            }

            fs.writeFileSync('comment-check.log', checkLog.join('\n'), 'utf8');
            core.setOutput('passed', violations.length === 0 ? 'true' : 'false');

      - name: Compose PR comment body
        shell: bash
        run: |
          if [ -s comment-check.log ]; then
            sed -n '1,120p' comment-check.log > comment-check-preview.log
          else
            echo "No output from comment check script." > comment-check-preview.log
          fi

          {
            echo "<!-- pr-auto-comment-report -->"
            echo "## PR 自动检查报告"
            echo ""
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- 分支: \`${{ github.event.pull_request.head.ref }}\` -> \`${{ github.event.pull_request.base.ref }}\`"
            echo "- 触发提交: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- 注释规范检查: ${{ steps.comment_check.outputs.passed == 'true' && 'PASS' || 'FAIL' }}"
            echo ""
            echo "### 本次 PR 更新记录"
            cat pr-change-notes.md
            echo ""
            echo "### 变更文件"
            echo '```text'
            cat pr-changed-files.md
            echo '```'
            echo ""
            echo "### 注释检查输出（前 120 行）"
            echo '```text'
            cat comment-check-preview.log
            echo '```'
          } > pr-comment.md

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-auto-comment-report -->';
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail workflow when comment check fails
        if: steps.comment_check.outputs.passed != 'true'
        run: |
          echo "Comment standard check failed. See PR comment for details."
          exit 1
