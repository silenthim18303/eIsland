name: Release Build & Upload to R2/COS/OSS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install Visual Studio Build Tools
        shell: pwsh
        run: |
          # Install VS Build Tools with C++ Desktop workload (required by node-gyp for native modules)
          $installerPath = "${{ runner.temp }}\vs_buildtools.exe"
          Invoke-WebRequest -Uri 'https://aka.ms/vs/17/release/vs_buildtools.exe' -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList '--quiet', '--norestart', '--nocache', '--add', 'Microsoft.VisualStudio.Workload.VCTools', '--includeRecommended' -Wait
          Remove-Item $installerPath

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Build & Package
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Notes
        run: node --experimental-strip-types scripts/generate-incremental-release-notes.ts -o RELEASE_NOTES.md

      - name: Upload to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws configure set default.s3.addressing_style auto
          aws configure set default.s3.payload_signing_enabled false
          for f in dist/*.exe dist/*.blockmap dist/latest.yml; do
            [ -f "$f" ] || continue
            echo "Uploading $f ..."
            aws s3 cp "$f" "s3://$R2_BUCKET/$(basename $f)" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto
          done

      # - name: Upload to Tencent COS and Aliyun OSS
      #   shell: pwsh
      #   env:
      #     COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      #     COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      #     COS_REGION: ${{ secrets.COS_REGION }}
      #     COS_BUCKET_NAME: ${{ secrets.COS_BUCKET_NAME }}
      #     OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      #     OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      #     OSS_REGION: ${{ secrets.OSS_REGION }}
      #     OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
      #   run: |
      #     node --experimental-strip-types scripts/upload-release-to-cos-oss.ts --dist dist
      #     Write-Host "COS update source: https://download-cos.eisland.pyisland.com/"
      #     Write-Host "OSS update source: https://download-oss.eisland.pyisland.com/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
