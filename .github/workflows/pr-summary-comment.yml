name: PR Summary Comment

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  summary-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Generate PR summary and post comment
        uses: actions/github-script@v7
        with:
          # Fall back to GITHUB_TOKEN when BOT_PAT is unavailable (e.g. fork PRs)
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- pr-auto-summary-comment -->';
            const sanitizeMentions = (text) => String(text ?? '').replace(/@/g, '@200b');

            // ========== 1. Fetch changed files ==========
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo,
              pull_number: pr.number,
              per_page: 100
            });

            // ========== 2. Fetch commits ==========
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo,
              pull_number: pr.number,
              per_page: 100
            });

            // ========== 3. Group by module ==========
            const moduleRules = [
              { label: 'Renderer',       re: /^src\/renderer\//  },
              { label: 'Main Process',   re: /^src\/main\//     },
              { label: 'Preload',        re: /^src\/preload\//  },
              { label: 'CI / Workflow',  re: /^\.github\//      },
              { label: 'Build / Config', re: /^(electron\..*|package\.json|tsconfig.*|\.eslintrc.*)$/ },
              { label: 'Docs',           re: /\.(md|txt)$/i     },
              { label: 'Assets',         re: /\.(png|jpg|jpeg|gif|svg|webp|ico|css)$/i },
            ];

            const groups = {};
            const otherFiles = [];

            for (const f of files) {
              const name = f.filename || '';
              let matched = false;
              for (const rule of moduleRules) {
                if (rule.re.test(name)) {
                  if (!groups[rule.label]) groups[rule.label] = [];
                  groups[rule.label].push(f);
                  matched = true;
                  break;
                }
              }
              if (!matched) otherFiles.push(f);
            }
            if (otherFiles.length > 0) groups['Other'] = otherFiles;

            // ========== 4. Statistics ==========
            let totalAdded = 0, totalDeleted = 0;
            const statusCount = { added: 0, modified: 0, removed: 0, renamed: 0 };
            for (const f of files) {
              totalAdded += f.additions || 0;
              totalDeleted += f.deletions || 0;
              const s = (f.status || 'modified').toLowerCase();
              if (s in statusCount) statusCount[s]++;
              else statusCount.modified++;
            }

            // ========== 5. Commit summary (latest 15) ==========
            const recentCommits = commits.slice(-15);
            const commitSummary = recentCommits.map(c => {
              const sha = (c.sha || '').slice(0, 7);
              const msg = sanitizeMentions((c.commit?.message || '').split('\n')[0] || '(no message)');
              const date = (c.commit?.author?.date || '').slice(0, 10);
              return `| \`${sha}\` | ${date} | ${msg} |`;
            });

            // ========== 6. File change details ==========
            const statusLabel = { added: 'ADD', modified: 'MOD', removed: 'DEL', renamed: 'REN' };
            const buildGroupTable = (groupFiles) => {
              const lines = [];
              for (const f of groupFiles) {
                const label = statusLabel[f.status] || f.status;
                const name = sanitizeMentions(f.filename || '');
                const adds = f.additions || 0;
                const dels = f.deletions || 0;
                lines.push(`| ${label} | \`${name}\` | +${adds} / -${dels} |`);
              }
              return lines;
            };

            const prTitle = sanitizeMentions(pr.title || '');
            const headRef = sanitizeMentions(pr.head?.ref || '');
            const baseRef = sanitizeMentions(pr.base?.ref || '');
            const submitter = sanitizeMentions(pr.user?.login || 'unknown');

            // ========== 7. Assemble comment body ==========
            const body = [];
            body.push(marker);
            body.push('## PR Auto Summary');
            body.push('');

            // Basic info
            body.push('### Basic Info');
            body.push('');
            body.push(`| Item | Value |`);
            body.push(`| --- | --- |`);
            body.push(`| **PR** | #${pr.number} |`);
            body.push(`| **Title** | ${prTitle} |`);
            body.push(`| **Branch** | \`${headRef}\` → \`${baseRef}\` |`);
            body.push(`| **Author** | @200b${submitter} |`);
            body.push(`| **Commits** | ${commits.length} |`);
            body.push(`| **Changed Files** | ${files.length} |`);
            body.push(`| **Total Lines** | **+${totalAdded}** / **-${totalDeleted}** |`);
            body.push('');

            // Change statistics
            body.push('### Change Statistics');
            body.push('');
            body.push(`| Operation | Count |`);
            body.push(`| --- | --- |`);
            if (statusCount.added > 0)    body.push(`| Added | ${statusCount.added} |`);
            if (statusCount.modified > 0) body.push(`| Modified | ${statusCount.modified} |`);
            if (statusCount.removed > 0)  body.push(`| Removed | ${statusCount.removed} |`);
            if (statusCount.renamed > 0)  body.push(`| Renamed | ${statusCount.renamed} |`);
            body.push('');

            // Affected modules
            const affectedModules = Object.keys(groups);
            body.push('### Affected Modules');
            body.push('');
            for (const mod of affectedModules) {
              const gf = groups[mod];
              const ga = gf.reduce((s, f) => s + (f.additions || 0), 0);
              const gd = gf.reduce((s, f) => s + (f.deletions || 0), 0);
              body.push(`- **${mod}** — ${gf.length} file(s) (+${ga} / -${gd})`);
            }
            body.push('');

            // File change details
            body.push('<details>');
            body.push('<summary><strong>File Change Details (click to expand)</strong></summary>');
            body.push('');
            for (const mod of affectedModules) {
              body.push(`#### ${mod}`);
              body.push('');
              body.push('| Status | File | Lines Changed |');
              body.push('| --- | --- | --- |');
              body.push(...buildGroupTable(groups[mod]));
              body.push('');
            }
            body.push('</details>');
            body.push('');

            // Commit log
            body.push('<details>');
            body.push(`<summary><strong>Commit Log${commits.length > 15 ? ` (latest 15 / ${commits.length} total)` : ` (${commits.length} total)`}</strong></summary>`);
            body.push('');
            body.push('| SHA | Date | Description |');
            body.push('| --- | --- | --- |');
            body.push(...commitSummary);
            body.push('');
            body.push('</details>');
            body.push('');

            // PR body excerpt
            const prBody = sanitizeMentions((pr.body || '').trim());
            if (prBody) {
              body.push('<details>');
              body.push('<summary><strong>PR Description (original)</strong></summary>');
              body.push('');
              body.push(prBody.length > 3000 ? prBody.slice(0, 3000) + '\n\n> [WARNING] Description truncated to 3000 characters' : prBody);
              body.push('');
              body.push('</details>');
              body.push('');
            }

            body.push('---');
            body.push('> This comment was auto-generated by the **PR Summary** workflow');

            const commentBody = body.join('\n');

            // ========== 8. Create or update comment ==========
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body: commentBody
              });
              core.notice(`Updated summary comment on PR #${pr.number}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body: commentBody
              });
              core.notice(`Created summary comment on PR #${pr.number}`);
            }
