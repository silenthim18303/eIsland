name: PR Summary Comment

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  summary-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Generate PR summary and post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- pr-auto-summary-comment -->';
            const sanitizeMentions = (text) => String(text ?? '').replace(/@/g, '@\u200b');

            // ========== 1. 获取变更文件列表 ==========
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo,
              pull_number: pr.number,
              per_page: 100
            });

            // ========== 2. 获取提交列表 ==========
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo,
              pull_number: pr.number,
              per_page: 100
            });

            // ========== 3. 按模块分组 ==========
            const moduleRules = [
              { label: '渲染层 (renderer)',   re: /^src\/renderer\//  },
              { label: '主进程 (main)',        re: /^src\/main\//     },
              { label: '预加载 (preload)',      re: /^src\/preload\//  },
              { label: 'CI / 工作流',          re: /^\.github\//      },
              { label: '构建 / 配置',          re: /^(electron\..*|package\.json|tsconfig.*|\.eslintrc.*)$/ },
              { label: '文档',                 re: /\.(md|txt)$/i     },
              { label: '资源文件',             re: /\.(png|jpg|jpeg|gif|svg|webp|ico|css)$/i },
            ];

            const groups = {};
            const otherFiles = [];

            for (const f of files) {
              const name = f.filename || '';
              let matched = false;
              for (const rule of moduleRules) {
                if (rule.re.test(name)) {
                  if (!groups[rule.label]) groups[rule.label] = [];
                  groups[rule.label].push(f);
                  matched = true;
                  break;
                }
              }
              if (!matched) otherFiles.push(f);
            }
            if (otherFiles.length > 0) groups['其他'] = otherFiles;

            // ========== 4. 统计数据 ==========
            let totalAdded = 0, totalDeleted = 0;
            const statusCount = { added: 0, modified: 0, removed: 0, renamed: 0 };
            for (const f of files) {
              totalAdded += f.additions || 0;
              totalDeleted += f.deletions || 0;
              const s = (f.status || 'modified').toLowerCase();
              if (s in statusCount) statusCount[s]++;
              else statusCount.modified++;
            }

            // ========== 5. 提交摘要（最近 15 条） ==========
            const recentCommits = commits.slice(-15);
            const commitSummary = recentCommits.map(c => {
              const sha = (c.sha || '').slice(0, 7);
              const msg = sanitizeMentions((c.commit?.message || '').split('\n')[0] || '(no message)');
              const date = (c.commit?.author?.date || '').slice(0, 10);
              return `| \`${sha}\` | ${date} | ${msg} |`;
            });

            // ========== 6. 文件变更详情 ==========
            const statusLabel = { added: 'ADD', modified: 'MOD', removed: 'DEL', renamed: 'REN' };
            const buildGroupTable = (groupFiles) => {
              const lines = [];
              for (const f of groupFiles) {
                const label = statusLabel[f.status] || f.status;
                const name = sanitizeMentions(f.filename || '');
                const adds = f.additions || 0;
                const dels = f.deletions || 0;
                lines.push(`| ${label} | \`${name}\` | +${adds} / -${dels} |`);
              }
              return lines;
            };

            const prTitle = sanitizeMentions(pr.title || '');
            const headRef = sanitizeMentions(pr.head?.ref || '');
            const baseRef = sanitizeMentions(pr.base?.ref || '');
            const submitter = sanitizeMentions(pr.user?.login || 'unknown');

            // ========== 7. 组装评论正文 ==========
            const body = [];
            body.push(marker);
            body.push('## PR 内容自动总结');
            body.push('');

            // 基本信息
            body.push('### 基本信息');
            body.push('');
            body.push(`| 项目 | 内容 |`);
            body.push(`| --- | --- |`);
            body.push(`| **PR** | #${pr.number} |`);
            body.push(`| **标题** | ${prTitle} |`);
            body.push(`| **分支** | \`${headRef}\` → \`${baseRef}\` |`);
            body.push(`| **提交者** | @\u200b${submitter} |`);
            body.push(`| **提交数** | ${commits.length} |`);
            body.push(`| **变更文件数** | ${files.length} |`);
            body.push(`| **总行数变更** | **+${totalAdded}** / **-${totalDeleted}** |`);
            body.push('');

            // 文件操作统计
            body.push('### 变更统计');
            body.push('');
            body.push(`| 操作 | 数量 |`);
            body.push(`| --- | --- |`);
            if (statusCount.added > 0)    body.push(`| 新增 | ${statusCount.added} |`);
            if (statusCount.modified > 0) body.push(`| 修改 | ${statusCount.modified} |`);
            if (statusCount.removed > 0)  body.push(`| 删除 | ${statusCount.removed} |`);
            if (statusCount.renamed > 0)  body.push(`| 重命名 | ${statusCount.renamed} |`);
            body.push('');

            // 影响模块概览
            const affectedModules = Object.keys(groups);
            body.push('### 影响模块');
            body.push('');
            for (const mod of affectedModules) {
              const gf = groups[mod];
              const ga = gf.reduce((s, f) => s + (f.additions || 0), 0);
              const gd = gf.reduce((s, f) => s + (f.deletions || 0), 0);
              body.push(`- **${mod}** — ${gf.length} 个文件（+${ga} / -${gd}）`);
            }
            body.push('');

            // 分组文件详情
            body.push('<details>');
            body.push('<summary><strong>文件变更详情（点击展开）</strong></summary>');
            body.push('');
            for (const mod of affectedModules) {
              body.push(`#### ${mod}`);
              body.push('');
              body.push('| 状态 | 文件 | 行数变更 |');
              body.push('| --- | --- | --- |');
              body.push(...buildGroupTable(groups[mod]));
              body.push('');
            }
            body.push('</details>');
            body.push('');

            // 提交记录
            body.push('<details>');
            body.push(`<summary><strong>提交记录${commits.length > 15 ? `（最近 15 / 共 ${commits.length}）` : `（共 ${commits.length}）`}</strong></summary>`);
            body.push('');
            body.push('| SHA | 日期 | 说明 |');
            body.push('| --- | --- | --- |');
            body.push(...commitSummary);
            body.push('');
            body.push('</details>');
            body.push('');

            // PR 描述摘录
            const prBody = sanitizeMentions((pr.body || '').trim());
            if (prBody) {
              body.push('<details>');
              body.push('<summary><strong>PR 描述原文</strong></summary>');
              body.push('');
              body.push(prBody.length > 3000 ? prBody.slice(0, 3000) + '\n\n> [WARNING] 描述过长，已截断至 3000 字符' : prBody);
              body.push('');
              body.push('</details>');
              body.push('');
            }

            body.push('---');
            body.push('> 此评论由 **PR Summary** 工作流自动生成');

            const commentBody = body.join('\n');

            // ========== 8. 创建或更新评论 ==========
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body: commentBody
              });
              core.notice(`Updated summary comment on PR #${pr.number}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body: commentBody
              });
              core.notice(`Created summary comment on PR #${pr.number}`);
            }
