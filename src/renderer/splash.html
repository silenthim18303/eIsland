<!--
  @file splash.html
  @description 应用启动画面，显示图标、应用名和加载动画
  @author 鸡哥
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eIsland</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    user-select: none;
  }

  .splash-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(20, 20, 22, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    opacity: 1;
    transition: opacity 0.3s ease-out;
  }

  .splash-container.fade-out {
    opacity: 0;
  }

  .icon-wrapper {
    width: 96px;
    height: 96px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    -webkit-user-drag: none;
  }

  .app-name {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .app-subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 32px;
  }

  .loading-pill {
    width: 120px;
    height: 36px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
  }

  .loading-pill::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.15) 50%,
      transparent 100%
    );
    animation: shimmer 1.8s ease-in-out infinite;
  }

  .loading-pill-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 6px;
  }

  .loading-pill-dot span {
    width: 6px;
    height: 6px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite both;
  }

  .loading-pill-dot span:nth-child(1) {
    animation-delay: -0.32s;
  }

  .loading-pill-dot span:nth-child(2) {
    animation-delay: -0.16s;
  }

  .loading-pill-dot span:nth-child(3) {
    animation-delay: 0s;
  }

  @keyframes shimmer {
    0% {
      transform: translateX(-100%);
    }
    100% {
      transform: translateX(100%);
    }
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0.6);
      opacity: 0.4;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  .version {
    position: absolute;
    bottom: 20px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
  }
</style>
</head>
<body>
  <div class="splash-container" id="splashContainer">
    <div class="icon-wrapper">
      <img id="appIcon" alt="eIsland">
    </div>
    <div class="app-name">eIsland</div>
    <div class="app-subtitle">灵动岛 · 正在启动</div>
    <div class="loading-pill">
      <div class="loading-pill-dot">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div class="version" id="versionText"></div>
  </div>

<script>
  function startFadeOut() {
    const container = document.getElementById('splashContainer');
    if (container) {
      container.classList.add('fade-out');
    }
  }

  (function() {
    const params = new URLSearchParams(window.location.search);
    const version = params.get('version') || '';
    const versionEl = document.getElementById('versionText');
    if (versionEl && version) {
      versionEl.textContent = 'v' + version;
    }

    const iconImg = document.getElementById('appIcon');
    if (iconImg) {
      iconImg.src = './svg/eisland.svg';
      iconImg.onerror = function() {
        iconImg.src = './svg/AI.svg';
      };
    }
  })();
</script>
</body>
</html>
